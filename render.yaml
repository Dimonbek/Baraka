services:
  - type: web
    name: barakatoping-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.src.main
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./barakatoping.db
      - key: PYTHONUNBUFFERED
        value: "true"
      - fromGroup: baraka-secrets
    disk:
      name: baraka-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: barakatoping-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
